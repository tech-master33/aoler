title: "[Question] "
body:
  - type: markdown
    attributes:
      value: |
        Ask anything about aoler or the BAOSP launcher.
        There are no wrong questions. You do not need to know any technical details to ask.
        If you found a bug (something that is broken, not just unclear), open a Bug report issue instead.

  - type: textarea
    id: question
    attributes:
      label: What is your question
      description: Describe what you are trying to do and where you are stuck.
      placeholder: "Example: I installed aoler and set it as my default launcher but when I press Home I still get the old launcher. How do I make aoler stay as the default?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried
      description: This helps avoid repeating suggestions you have already tested.
      placeholder: "Example: I went to Settings, Default apps, Home app, and selected aoler. It worked once but went back to the old launcher after restarting."
    validations:
      required: false

  - type: input
    id: android-version
    attributes:
      label: Android version and device
      description: Helps narrow down whether the issue is device-specific.
      placeholder: "Example: Android 10, Samsung Galaxy A21s"
    validations:
      required: false

  - type: dropdown
    id: screen-reader
    attributes:
      label: Which screen reader are you using
      options:
        - andrdscren (BAOSP)
        - TalkBack (Google)
        - No screen reader
        - Not relevant to my question
    validations:
      required: false
