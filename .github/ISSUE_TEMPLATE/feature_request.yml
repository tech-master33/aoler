name: Feature request
description: Suggest something new or improved for the aoler launcher
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement.
        You do not need to know how to code to submit a feature request.
        Just describe what you want to be able to do.

  - type: textarea
    id: problem
    attributes:
      label: What task are you trying to accomplish
      description: Describe the real task you want to complete, not the technical solution. Start with "I want to be able to..."
      placeholder: "Example: I want to be able to pin my five most-used apps to the top of the home screen so I do not have to scroll through the full list every time."
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: How you currently work around this
      description: What do you do today when this feature is missing? Describe your workaround, or say "There is no workaround" if you are stuck.
      placeholder: "Example: I scroll through the full app drawer every time. It takes about 20 swipes to reach the app I use most."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: What you would like to see
      description: Describe the feature in plain language. How would it work? Where in the launcher would it appear?
      placeholder: "Example: A short list of favourites at the top of the home screen, reachable in two swipes from anywhere, with a way to add and remove apps from the list."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the launcher does this relate to
      options:
        - Home screen (what you see after pressing Home)
        - App drawer (the full app list, opened by swiping up)
        - Gestures and navigation
        - Screen reader announcements
        - Focus order and keyboard navigation
        - Something else
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: How much does this affect your daily use
      options:
        - Blocks me completely — I cannot do what I need to do
        - Major inconvenience — I lose significant time working around it
        - Minor inconvenience — annoying but manageable
        - Nice to have — would improve the experience but not urgent
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Other launchers or apps that handle this well, related issues, or any other context.
    validations:
      required: false
