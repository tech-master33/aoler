name: aoler Nightly

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build aoler APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout aoler — latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print commit being built
        run: |
          echo "aoler commit:"
          git log -1 --format="%H  %s  (%ci)"
          echo "AOLER_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "AOLER_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version info
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          mkdir -p /tmp/release
          cp "$APK" "/tmp/release/aoler-${{ env.AOLER_SHA }}.apk"
          echo "aoler APK ready: $(ls -lh /tmp/release/aoler-*.apk)"

      - name: Delete previous nightly release
        run: |
          gh release delete nightly --yes || true
          git push --delete origin nightly || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "aoler Nightly — ${{ env.AOLER_DATE }}"
          body: |
            Automated nightly build of the aoler accessible launcher.

            **Commit:** ${{ env.AOLER_SHA }}
            **Built:** ${{ env.AOLER_DATE }}

            ## Installing

            1. Download `aoler-*.apk`
            2. Transfer to your Android device and install
            3. Press Home — select **aoler** and tap **Always**

            Part of the [BAOSP](https://github.com/tech-master33/baosp) ecosystem.
          prerelease: true
          files: /tmp/release/aoler-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
